<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/order.css">
    <title>Document</title>
</head>

<body>
    <form>
        <h1>Homework for CSS flexbox</h1>
        <div class="container">
            <fieldset>
                <legend>Personal info</legend>
                <div>
                    <label for="first-name">First name</label>
                    <input type="text" id="first-name" name="first-name" required>
                </div>

                <div>
                    <label for="last-name">Last name</label>
                    <input type="text" id="last-name" name="last-name" required>
                </div>

                <div>
                    <label for="birthday">Birthday</label>
                    <input type="datetime-local" id="birthday" name="birthday">
                </div>

                <label>Gender</label>
                <div>
                    <label for="male-rad">Male</label>
                    <input type="radio" name="gender" id="male-rad" checked>
                    <label for="female-rad">Female</label>
                    <input type="radio" name="gender" id="female-rad">
                </div>

                <div>
                    <label for="experience">Drive experience</label>
                    <select name="experience" id="experience">
                        <option value="expDisabled" disabled selected>---</option>
                        <option value="zeroOne">0 - 1 year</option>
                        <option value="oneThree">1 - 3 years</option>
                        <option value="threeSeven">3 - 7 years</option>
                        <option value="sevenTen">7 - 10+ year </option>
                    </select>
                </div>
            </fieldset>


            <fieldset>
                <legend>Contacts</legend>
                <div>
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div>
                    <label for="phone-number">Phone</label>
                    <input type="tel" id="phone-number" required>
                </div>

                <div>
                    <label for="address-textarea">Address</label>
                    <textarea id="address-textarea"></textarea>
                </div>
            </fieldset>


            <fieldset>
                <legend>Car info</legend>
                <div>
                    <label for="brand">Brand</label>
                    <select name="brand" id="brand">
                        <option value="brdDisabled" disabled selected>---</option>
                        <option value="Mercedes">Mercedes</option>
                        <option value="Ferrari">Ferrari</option>
                        <option value="BMW">BMW</option>
                    </select>
                </div>

                <div>
                    <label for="model">Model</label>
                    <select name="model" id="model">
                        <option value="mdlDisabled" disabled selected>---</option>
                        <option value="Mercedes-AMG G63">Mercedes-AMG G63</option>
                        <option value="Mercedes-Benz EQS 580">Mercedes-Benz EQS 580</option>
                        <option value="Ferrari F8 Tributo">Ferrari F8 Tributo</option>
                        <option value="Ferrari SF90 Stradale">Ferrari SF90 Stradale</option>
                        <option value="BMW M3 (G80)">BMW M3 (G80)</option>
                        <option value="BMW iX M60">BMW iX M60</option>
                    </select>
                </div>

                <div>
                    <label for="used-chb">Used</label>
                    <input type="checkbox" id="used-chb" name="used-chb">
                </div>

                <label>Color</label>
                <div>
                    <label for="red-color">Red</label>
                    <input type="radio" name="color" id="red-color" checked>
                    <label for="black-color">Black</label>
                    <input type="radio" name="color" id="black-color">
                    <label for="blue-color">Blue</label>
                    <input type="radio" name="color" id="blue-color">
                    <label for="white-color">White</label>
                    <input type="radio" name="color" id="white-color">
                    <label for="gray-color">Gray</label>
                    <input type="radio" name="color" id="gray-color">
                </div>

                <div>
                    <label for="price-range">Price k$</label>
                    <div>
                        <input type="range" name="price-range" step="10" id="price-range" list="price-list" min="10"
                            max="100">
                        <datalist id="price-list">
                            <option value="10" label="10"></option>
                            <option value="20" label="20"></option>
                            <option value="30" label="30"></option>
                            <option value="40" label="40"></option>
                            <option value="50" label="50"></option>
                            <option value="60" label="60"></option>
                            <option value="70" label="70"></option>
                            <option value="80" label="80"></option>
                            <option value="90" label="90"></option>
                            <option value="100" label="100"></option>
                        </datalist>
                    </div>
                </div>
                <div>

                </div>
            </fieldset>
        </div>

        <div class="btn-wrapper">
            <input type="reset" value="Cancel">
            <input type="submit" value="Ok">
        </div>
    </form>
</body>

</html>
