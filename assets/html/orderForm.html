<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../css/order.css">
    <title>Document</title>

<body>
    <form>
        <h1>Homework for CSS flexbox</h1>
        <div class="container">
            <fieldset>
                <legend>Personal info</legend>
                <div>
                    <label for="firstName">First name</label>
                    <input type="text" id="firstName" name="firstName" required>
                </div>

                <div>
                    <label for="lastName">Last name</label>
                    <input type="text" id="lastName" name="lastName" required>
                </div>

                <div>
                    <label for="birthday">Birthday</label>
                    <input type="datetime-local" id="birthday" name="birthday">
                </div>

                <label>Gender</label>
                <div>
                    <label for="maleRad">Male</label>
                    <input type="radio" name="gender" id="maleRad" checked>
                    <label for="femaleRad">Female</label>
                    <input type="radio" name="gender" id="femaleRad">
                </div>

                <div>
                    <label for="experience">Drive experience</label>
                    <select name="experience" id="experience">
                        <option value="expDisabled" disabled selected>---</option>
                        <option value="zeroOne">0 - 1 year</option>
                        <option value="oneThree">1 - 3 years</option>
                        <option value="threeSeven">3 - 7 years</option>
                        <option value="sevenTen">7 - 10+ year </option>
                    </select>
                </div>
            </fieldset>


            <fieldset>
                <legend>Contacts</legend>
                <div>
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div>
                    <label for="phoneNumber">Phone</label>
                    <input type="tel" id="phoneNumber" required>
                </div>

                <div>
                    <label for="addressTextarea">Address</label>
                    <textarea id="addressTextarea"></textarea>
                </div>
            </fieldset>


            <fieldset>
                <legend>Car info</legend>
                <div>
                    <label for="brand">Brand</label>
                    <select name="brand" id="brand">
                        <option value="brdDisabled" disabled selected>---</option>
                        <option value="Mercedes">Mercedes</option>
                        <option value="Ferrari">Ferrari</option>
                        <option value="BMW">BMW</option>
                    </select>
                </div>

                <div>
                    <label for="model">Model</label>
                    <select name="model" id="model">
                        <option value="mdlDisabled" disabled selected>---</option>
                        <option value="Mercedes-AMG G63">Mercedes-AMG G63</option>
                        <option value="Mercedes-Benz EQS 580">Mercedes-Benz EQS 580</option>
                        <option value="Ferrari F8 Tributo">Ferrari F8 Tributo</option>
                        <option value="Ferrari SF90 Stradale">Ferrari SF90 Stradale</option>
                        <option value="BMW M3 (G80)">BMW M3 (G80)</option>
                        <option value="BMW iX M60">BMW iX M60</option>
                    </select>
                </div>

                <div>
                    <label for="usedChb">Used</label>
                    <input type="checkbox" id="usedChb" name="usedChb">
                </div>

                <label>Color</label>
                <div>

                    <label for="redColor">Red</label>
                    <input type="radio" name="color" id="redColor" checked>
                    <label for="blackColor">Black</label>
                    <input type="radio" name="color" id="blackColor">
                    <label for="blueColor">Blue</label>
                    <input type="radio" name="color" id="blueColor">
                    <label for="whiteColor">White</label>
                    <input type="radio" name="color" id="whiteColor">
                    <label for="grayColor">Gray</label>
                    <input type="radio" name="color" id="grayColor">
                </div>

                <div>
                    <label for="priceRange">Price</label>
                    <input type="range" name="priceRange" step="5000" id="priceRange" min="40000" max="450000"
                        value="40000" oninput="out.value = priceRange.value">
                    <output id="out">40000</output>
                </div>
            </fieldset>
        </div>
